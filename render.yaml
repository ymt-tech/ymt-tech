# YMT Works — チーム管理デモ（本番相当）
#
# Render Dashboard → New → Blueprint → このリポジトリを接続
# Web Service + PostgreSQL（サンプルデータ付き）が立ち上がります。
#
# デモログイン: demo@ymt-works.jp / demo1234
# 関連リポジトリ（予定の分割先）: https://github.com/ymt-tech/team-management

databases:
  - name: team-management-db
    plan: free
    databaseName: team_management
    user: team_management

services:
  - type: web
    name: team-management-demo
    runtime: node
    plan: free
    branch: main
    rootDir: apps/team-management
    buildCommand: npm ci && npm run build
    startCommand: npx prisma migrate deploy && npm run db:seed && npm run start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: team-management-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PORTFOLIO_URL
        value: https://tech.ymt-it.jp/
